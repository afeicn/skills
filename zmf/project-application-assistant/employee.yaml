  - 预算金额
  - 财务数据
  - 盖章材料
  - 最终提交
  can_auto_generate:
  - 政策摘要
  - 匹配度评估
  - 材料清单
  - 申报书框架
  - 预算草案
  - 答辩问题
  must_not_do:
