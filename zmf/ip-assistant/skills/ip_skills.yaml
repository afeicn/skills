  purpose: 基于关键词和检索结果生成相似技术、差异方向和风险提示。
  inputs:
  - keywords
  - search_results
  - technical_solution
  outputs:
  - search_summary
  - similar_tech
  - differentiation_notes
  human_review: true
  audit_log: true
- id: IP04_trademark_material_checklist
