---
skills:
- id: IP01_innovation_mining
  name: 创新点挖掘
  purpose: 从技术方案、项目材料和产品说明中提炼创新点、差异点和技术效果。
  inputs:
  - technical_solution
  - project_records
  - product_description
  outputs:
  - innovation_points
  - technical_effects
  - disclosure_questions
  human_review: true
  audit_log: true
- id: IP02_patent_disclosure_generate
