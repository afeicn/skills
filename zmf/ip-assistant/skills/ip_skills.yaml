  purpose: 生成商标名称、类别、申请主体、使用证据和材料清单。
  inputs:
  - trademark_name
  - business_scope
  - usage_materials
  outputs:
  - trademark_checklist
  - class_suggestion
  - risk_notes
  human_review: true
  audit_log: true
- id: IP05_software_copyright_material
  name: 软著材料生成
  purpose: 生成软件说明书、功能模块、运行环境、材料清单和代码说明。
