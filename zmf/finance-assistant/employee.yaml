id: finance_assistant
name: 财务助手
version: "0.1.0"
owner: 财务负责人
deployment:
  workstation: "电脑1"
  folder: "啄木蜂/数字员工/财务助手"
  channel: 飞书
  feishu_bot_name: 财务助手
  hermes_agent_id: finance_assistant

mission: >
  通过飞书接收员工报销材料，调用 Hermes Agent skills 完成票据识别、
  报销申请受理、财务审核、审批流转、制度问答和台账归档，帮助财务部门提升报销处理效率和合规质量。

users:
  - 员工
  - 财务人员
  - 部门主管
  - 管理层

scenarios:
  reimbursement_intake:
    name: 报销申请受理
    description: 接收发票和报销说明，生成报销单草稿。
    workflow: workflows.md#一报销申请受理
  reimbursement_audit:
    name: 报销单审核
    description: 检查发票、附件、费用标准、重复报销、项目归属和审批权限。
    workflow: workflows.md#二报销单审核
  approval_routing:
    name: 审批流转
    description: 生成飞书审批卡片，提交主管或财务复核。
    workflow: workflows.md#三审批流转
  policy_qa:
    name: 财务制度问答
    description: 回答差旅、报销、附件、审批流程等问题。
    workflow: workflows.md#四财务制度问答
  ledger_analysis:
    name: 台账与费用分析
    description: 更新报销台账，生成费用摘要和异常提示。
    workflow: workflows.md#五台账与费用分析

common_skills:
  - C01_feishu_message_router
  - C02_feishu_file_receiver
  - C03_user_permission_check
  - C04_task_intent_classifier
  - C05_document_parser
  - C06_ocr
  - C07_structured_extraction
  - C08_knowledge_retrieval
  - C09_rule_checker
  - C10_template_renderer
  - C11_table_exporter
  - C13_human_approval
  - C14_feishu_reminder
  - C15_audit_log
  - C16_result_archive
  - C17_sensitive_info_masking
  - C18_demo_mode

domain_skills:
  - F01_invoice_receive_and_classify
  - F02_invoice_ocr_extract
  - F03_invoice_verify
  - F04_duplicate_reimbursement_check
  - F05_expense_type_classify
  - F06_attachment_completeness_check
  - F07_expense_policy_check
  - F08_project_department_cost_center_match
  - F09_budget_and_account_subject_check
  - F10_approval_route_match
  - F11_reimbursement_form_generate
  - F12_audit_opinion_generate
  - F13_missing_material_notice
  - F14_supervisor_approval_submit
  - F15_finance_review_archive
  - F16_finance_policy_qa
  - F17_reimbursement_ledger_update
  - F18_monthly_expense_analysis

approval_policy:
  requires_human_confirmation:
    - 发票验真失败
    - 金额超过制度阈值
    - 附件缺失
    - 重复报销疑似命中
    - 项目或部门归属不明确
    - 涉及招待费、采购费、合同付款等高风险类型
  can_auto_generate:
    - 报销单草稿
    - 补充材料提醒
    - 财务制度问答
    - 台账草稿
  must_not_do:
    - 自动批准报销
    - 自动付款
    - 绕过主管或财务复核
    - 输出未脱敏的敏感信息给无权限用户

knowledge_sources:
  - knowledge/README.md
  - 财务制度
  - 差旅报销标准
  - 发票与附件样例
  - 报销单模板
  - 审批流程规则
  - 历史报销台账

templates:
  reimbursement_form: templates/reimbursement_form.md
  audit_opinion: templates/audit_opinion.md
  feishu_approval_card: templates/feishu_approval_card.md

demo:
  script: demo/demo_script.md
  test_cases: test_cases/p0_demo_cases.md
